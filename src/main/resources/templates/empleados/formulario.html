<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nominet - Empleados</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8fafb; margin: 0; }

        nav {
            background: #1A2E40;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 15px; }

        label { font-weight: 600; font-size: 14px; }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        button {
            background: #16A34A;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #15803d; }

        .empresa-box {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<nav>
    <div>NOMINET</div>
    <a href="/dashboard" style="color:white;">Volver</a>
</nav>

<div class="container">

    <h2 th:text="${modo == 'crear'} ? 'Crear Empleado' : 'Editar Empleado'"></h2>

    <form th:action="@{/empleados/guardar}" th:object="${empleado}" method="post">

        <!-- CÉDULA -->
        <div class="form-group">
            <label>Cédula</label>
            <input type="text" th:field="*{cedula}" required>
        </div>

        <!-- NOMBRE -->
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" required>
        </div>

        <!-- CORREO -->
        <div class="form-group">
            <label>Correo</label>
            <input type="email" th:field="*{correo}" required>
        </div>

        <!-- CELULAR -->
        <div class="form-group">
            <label>Celular</label>
            <input type="text" th:field="*{celular}" required>
        </div>

        <!-- ROL -->
        <div class="form-group">
            <label>Rol</label>
            <select name="rol">
                <option value="TRABAJADOR">Trabajador</option>
                <option value="NOMINA">Nómina</option>
            </select>
        </div>

        <!-- ESTADO -->
        <div class="form-group">
            <label>Estado</label>
            <select th:field="*{estado}">
                <option value="ACTIVO">Activo</option>
                <option value="INACTIVO">Inactivo</option>
            </select>
        </div>

        <!-- EMPRESA (SOLO LECTURA - SIN ERROR 500) -->
        <div class="form-group">
            <label>Empresa</label>
            <div class="empresa-box">
                <span th:text="${empresa != null ? empresa.nombre : 'Sin empresa'}"></span>
            </div>
        </div>

        <div style="margin-top:20px;">
            <button type="submit">Guardar</button>
        </div>

    </form>

</div>

</body>
</html>
