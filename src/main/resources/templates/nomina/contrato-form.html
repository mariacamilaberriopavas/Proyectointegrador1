<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nominet – Nuevo Contrato</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --verde: #16A34A; --azul: #1A2E40; --azul-nom: #3b82f6; }
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }

        nav { background: var(--azul); display: flex; align-items: center;
            justify-content: space-between; padding: 0 2rem; height: 66px; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: white; text-decoration: none; }
        .nav-right { display: flex; gap: 1.5rem; align-items: center; }
        .badge-rol { background: rgba(59,130,246,.3); color: #93c5fd; border: 1px solid rgba(59,130,246,.4);
            font-size: .72rem; font-weight: 700; padding: .2rem .65rem; border-radius: 20px; text-transform: uppercase; }
        .btn-logout { color: white; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
            padding: .4rem 1rem; border-radius: 6px; text-decoration: none; font-size: .85rem; font-weight: 500; }

        .layout { display: flex; min-height: calc(100vh - 66px); }
        aside { width: 230px; background: white; box-shadow: 2px 0 8px rgba(0,0,0,.06); padding: 1.5rem 0; flex-shrink: 0; }
        .sidebar-section { padding: .5rem 1.6rem; font-size: .72rem; font-weight: 700;
            text-transform: uppercase; color: #9ca3af; letter-spacing: .06em; margin-top: .5rem; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li a { display: flex; align-items: center; gap: .8rem; padding: .75rem 1.6rem; color: #4b5563;
            text-decoration: none; font-size: .9rem; font-weight: 500; transition: background .2s; border-left: 3px solid transparent; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: #eff6ff; color: var(--azul-nom); border-left-color: var(--azul-nom); }

        main { flex: 1; padding: 2rem; display: flex; justify-content: center; align-items: flex-start; }

        .card { background: white; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 620px; }
        .card-header { margin-bottom: 2rem; }
        .card-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--azul); }
        .card-header p { color: #6b7280; font-size: .88rem; margin-top: .3rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: .45rem; }
        label .req { color: #ef4444; }
        input, select { width: 100%; padding: .65rem .9rem; border: 1.5px solid #d1d5db; border-radius: 9px;
            font-family: 'Poppins', sans-serif; font-size: .88rem; color: #111827; transition: border-color .2s; }
        input:focus, select:focus { outline: none; border-color: var(--azul-nom); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-guardar { background: var(--azul-nom); color: white; border: none; padding: .75rem 2rem; border-radius: 9px;
            font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 700; cursor: pointer; flex: 1; transition: background .2s; }
        .btn-guardar:hover { background: #2563eb; }
        .btn-cancelar { background: white; color: #6b7280; border: 1.5px solid #d1d5db; padding: .75rem 2rem;
            border-radius: 9px; font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cancelar:hover { background: #f3f4f6; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/nomina/dashboard}" class="nav-logo">Nominet</a>
    <div class="nav-right">
        <span class="badge-rol">Nómina</span>
        <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="layout">
    <aside>
        <ul class="sidebar-menu">
            <li><a th:href="@{/nomina/dashboard}"><span>🏠</span> Dashboard</a></li>
        </ul>
        <div class="sidebar-section">Empleados</div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/nomina/empleados}" class="active"><span>👥</span> Ver empleados</a></li>
        </ul>
    </aside>

    <main>
        <div class="card">
            <div class="card-header">
                <h1>📋 Nuevo contrato</h1>
                <p>Empleado: <strong th:text="${empleado.nombre}">Empleado</strong> — Cédula: <span th:text="${empleado.cedula}">-</span></p>
            </div>

            <form th:action="@{/nomina/contratos/guardar/{id}(id=${empleado.idempleados})}"
                  th:object="${contrato}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de contrato <span class="req">*</span></label>
                        <select th:field="*{tipocontrato}" required>
                            <option value="">Seleccionar...</option>
                            <option value="indefinido">Indefinido</option>
                            <option value="fijo">Término fijo</option>
                            <option value="prestacion">Prestación de servicios</option>
                            <option value="aprendizaje">Aprendizaje</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cargo <span class="req">*</span></label>
                        <input type="text" th:field="*{cargo}" placeholder="Ej: Auxiliar contable" required>
                    </div>
                    <div class="form-group">
                        <label>Salario mensual <span class="req">*</span></label>
                        <input type="number" th:field="*{salario}" placeholder="1300000" min="0" step="1000" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha de inicio <span class="req">*</span></label>
                        <input type="date" th:field="*{fechaInicio}" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha de fin <small style="color:#9ca3af;">(opcional)</small></label>
                        <input type="date" th:field="*{fechaFin}">
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/nomina/contratos/{id}(id=${empleado.idempleados})}" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">Guardar contrato</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
