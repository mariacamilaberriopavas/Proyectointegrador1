<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nominet – Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --verde: #16A34A; --azul: #1A2E40; --gris: #202532; --claro: #F3F4F6; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--azul);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Fondo decorativo */
        .bg-decor {
            position: fixed; inset: 0; overflow: hidden; z-index: 0;
        }
        .bg-decor::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(22,163,74,.2) 0%, transparent 70%);
            top: -100px; right: -100px; border-radius: 50%;
        }
        .bg-decor::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(22,163,74,.1) 0%, transparent 70%);
            bottom: -50px; left: -80px; border-radius: 50%;
        }

        /* Card central */
        .login-wrapper {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: center;
            flex: 1; padding: 2rem;
        }
        .login-card {
            background: white; border-radius: 24px;
            width: 100%; max-width: 420px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }
        .card-top {
            background: var(--verde);
            padding: 2rem 2.2rem 1.8rem;
            text-align: center;
        }
        .card-top .logo { font-size: 2rem; font-weight: 800; color: white; letter-spacing: 1px; }
        .card-top p { color: rgba(255,255,255,.85); font-size: .9rem; margin-top: .3rem; }

        .card-body { padding: 2.2rem; }

        .form-group { margin-bottom: 1.3rem; }
        .form-group label {
            display: block; font-size: .82rem; font-weight: 600;
            color: var(--azul); margin-bottom: .45rem;
        }
        .form-group input {
            width: 100%; padding: .8rem 1rem;
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            font-family: 'Poppins', sans-serif; font-size: .92rem;
            outline: none; transition: border-color .2s, box-shadow .2s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: var(--verde);
            box-shadow: 0 0 0 3px rgba(22,163,74,.12);
            background: white;
        }

        .btn-login {
            width: 100%; padding: .9rem;
            background: var(--verde); color: white;
            font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700;
            border: none; border-radius: 10px; cursor: pointer;
            letter-spacing: .5px; margin-top: .5rem;
            transition: background .2s, transform .15s;
        }
        .btn-login:hover { background: #15803d; transform: translateY(-2px); }

        .alert-error {
            background: #fef2f2; color: #dc2626;
            border: 1px solid #fecaca; border-radius: 8px;
            padding: .8rem 1rem; font-size: .85rem; font-weight: 500;
            margin-bottom: 1.2rem;
        }

        .card-footer-link {
            text-align: center; margin-top: 1.5rem;
            font-size: .85rem; color: #6b7280;
        }
        .card-footer-link a { color: var(--verde); font-weight: 600; text-decoration: none; }
        .card-footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="bg-decor"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="card-top">
            <div class="logo">Nominet</div>
            <p>Gestión empresarial simplificada</p>
        </div>
        <div class="card-body">

            <div th:if="${error}" class="alert-error" th:text="${error}"></div>
            <div th:if="${exito}" style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0;border-radius:8px;padding:.8rem 1rem;font-size:.85rem;font-weight:500;margin-bottom:1.2rem;" th:text="${exito}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo"
                           placeholder="tu@empresa.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión</button>
            </form>

            <p class="card-footer-link">
                ¿No tienes cuenta?
                <a th:href="@{/registro}">Registra tu empresa</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
