<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nominet – Mi Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --verde: #16A34A; --azul: #1A2E40; }
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }

        nav { background: var(--azul); display: flex; align-items: center;
            justify-content: space-between; padding: 0 2rem; height: 66px; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: white; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-empresa { color: rgba(255,255,255,.8); font-size: .88rem; }
        .nav-empresa span { color: white; font-weight: 600; }
        .btn-logout { color: white; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
            padding: .4rem 1rem; border-radius: 6px; text-decoration: none; font-size: .85rem; font-weight: 500; }
        .btn-logout:hover { background: rgba(255,255,255,.25); }

        .layout { display: flex; min-height: calc(100vh - 66px); }

        aside { width: 230px; background: white; box-shadow: 2px 0 8px rgba(0,0,0,.06); padding: 1.5rem 0; flex-shrink: 0; }
        .sidebar-section { padding: .5rem 1.6rem; font-size: .72rem; font-weight: 700;
            text-transform: uppercase; color: #9ca3af; letter-spacing: .06em; margin-top: .5rem; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li a { display: flex; align-items: center; gap: .8rem; padding: .75rem 1.6rem; color: #4b5563;
            text-decoration: none; font-size: .9rem; font-weight: 500; transition: background .2s; border-left: 3px solid transparent; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: #f0fdf4; color: var(--verde); border-left-color: var(--verde); }

        main { flex: 1; padding: 2rem; display: flex; justify-content: center; align-items: flex-start; }

        .card { background: white; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 620px; }
        .card-header { margin-bottom: 2rem; }
        .card-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--azul); }
        .card-header p { color: #6b7280; font-size: .88rem; margin-top: .3rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: .45rem; }
        .req { color: #ef4444; }
        input { width: 100%; padding: .65rem .9rem; border: 1.5px solid #d1d5db; border-radius: 9px;
            font-family: 'Poppins', sans-serif; font-size: .88rem; color: #111827; transition: border-color .2s; }
        input:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
        input[readonly] { background: #f8fafc; color: #6b7280; cursor: not-allowed; }
        .field-error { color: #ef4444; font-size: .78rem; margin-top: .3rem; }

        .info-box { background: #fef9c3; border: 1px solid #fde68a; border-radius: 9px; padding: .8rem 1rem;
            font-size: .83rem; color: #92400e; margin-bottom: 1.5rem; }

        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-guardar { background: var(--verde); color: white; border: none; padding: .75rem 2rem; border-radius: 9px;
            font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 700; cursor: pointer; flex: 1; }
        .btn-guardar:hover { background: #15803d; }
        .btn-cancelar { background: white; color: #6b7280; border: 1.5px solid #d1d5db; padding: .75rem 2rem;
            border-radius: 9px; font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cancelar:hover { background: #f3f4f6; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/dashboard}" class="nav-logo">Nominet</a>
    <div class="nav-right">
        <span class="nav-empresa">Empresa: <span th:text="${empresa.nombre}">-</span></span>
        <a th:href="@{/logout}" class="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="layout">
    <aside>
        <ul class="sidebar-menu">
            <li><a th:href="@{/dashboard}"><span>🏠</span> Dashboard</a></li>
        </ul>
        <div class="sidebar-section">Gestión</div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/empleados}"><span>👥</span> Empleados</a></li>
        </ul>
        <div class="sidebar-section">Empresa</div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/empresas/editar/{id}(id=${empresa.idempresa})}" class="active"><span>🏢</span> Mi empresa</a></li>
        </ul>
    </aside>

    <main>
        <div class="card">
            <div class="card-header">
                <h1>🏢 Datos de mi empresa</h1>
                <p>Actualiza la información de tu empresa. El ID no puede modificarse.</p>
            </div>

            <div class="info-box">⚠️ El campo <strong>ID</strong> no puede modificarse por razones de seguridad.</div>

            <form th:action="@{/empresas/editar/{id}(id=${empresa.idempresa})}"
                  th:object="${empresa}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>ID empresa</label>
                        <input type="text" th:value="${empresa.idempresa}" readonly>
                    </div>
                    <div class="form-group">
                        <label>NIT <span class="req">*</span></label>
                        <input type="text" th:field="*{nit}" required>
                        <div th:if="${#fields.hasErrors('nit')}" class="field-error" th:errors="*{nit}"></div>
                    </div>
                    <div class="form-group">
                        <label>Nombre empresa <span class="req">*</span></label>
                        <input type="text" th:field="*{nombre}" required>
                        <div th:if="${#fields.hasErrors('nombre')}" class="field-error" th:errors="*{nombre}"></div>
                    </div>
                    <div class="form-group">
                        <label>Correo <span class="req">*</span></label>
                        <input type="email" th:field="*{correo}" required>
                        <div th:if="${#fields.hasErrors('correo')}" class="field-error" th:errors="*{correo}"></div>
                    </div>
                    <div class="form-group">
                        <label>Celular</label>
                        <input type="text" th:field="*{celular}">
                    </div>
                    <div class="form-group">
                        <label>Nueva contraseña <small style="color:#9ca3af;">(dejar vacío para no cambiar)</small></label>
                        <input type="password" th:field="*{password}" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/dashboard}" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">Guardar cambios</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
